<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Iceland South-West Seismic Network</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/css/leaflet-sidebar.min.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .station-label { background: rgba(255, 255, 255, 0.9); border: 1px solid #c62828; border-radius: 3px; 
                         padding: 0px 4px; font-weight: bold; font-size: 11px; color: #333; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .sidebar-header { background: #c62828 !important; }
        .btn { display: block; background: #c62828; color: white; padding: 14px; text-align: center; 
               text-decoration: none; border-radius: 5px; font-weight: bold; margin-bottom: 10px; transition: background 0.3s; }
        .btn:hover { background: #9b1c1c; }
        .coords-text { font-family: monospace; font-size: 11px; color: #666; background: #f4f4f4; padding: 5px; border-radius: 3px; border-left: 3px solid #c62828; }
    </style>
</head>
<body>

    <div id="sidebar" class="leaflet-sidebar collapsed">
        <div class="leaflet-sidebar-tabs"><ul role="tablist"><li><a href="#home" role="tab">📉</a></li></ul></div>
        <div class="leaflet-sidebar-content">
            <div class="leaflet-sidebar-pane" id="home">
                <h2 class="leaflet-sidebar-header">Live Seismic Data<span class="leaflet-sidebar-close">×</span></h2>
                <div id="station-content" style="padding:15px;">
                    <p>Select a station on the map to begin monitoring.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/js/leaflet-sidebar.min.js"></script>

    <script>
        var map = L.map('map', { 
    zoomControl: false,
    minZoom: 6, // Prevents zooming out to see the UK/Greenland
    maxBounds: [[63.0, -25.0], [67.0, -13.0]], // Locks view to Iceland
    maxBoundsViscosity: 1.0 // Makes the edges feel "solid"
}).setView([64.90, -18.5], 6);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 }).addTo(map);
        var sidebar = L.control.sidebar({ container: 'sidebar' }).addTo(map);

        var stations = [{ id: "klv", name: "Kleifarvatn", lat: 63.91447, lon: -21.95979, url: "klv" },
            { id: "odf", name: "Ölkelduháls", lat: 63.94253, lon: -22.11324, url: "odf" },
            { id: "eld", name: "Eldey", lat: 63.74067, lon: -22.95803, url: "eld" },
            { id: "fad", name: "Fagradalsfjall", lat: 63.91668, lon: -22.28938, url: "fad" },
            { id: "grv", name: "Grindavík", lat: 63.85716, lon: -22.45583, url: "grv" },
            { id: "rne", name: "Reykjanesviti", lat: 63.81681, lon: -22.70563, url: "rne" },
            { id: "vog", name: "Vogar", lat: 63.96967, lon: -22.39285, url: "vog" },
            { id: "moh", name: "Móhálshnúkar", lat: 63.92269, lon: -22.06688, url: "moh" },
            { id: "ash", name: "Afstapahraun", lat: 63.98167, lon: -22.14986, url: "ash" },
            { id: "kri", name: "Krýsuvík", lat: 63.8781, lon: -22.07646, url: "kri" },
            { id: "iss", name: "Ísólfsskáli-S", lat: 63.86524, lon: -22.30963, url: "iss" },
            { id: "lag", name: "Lágar", lat: 63.90702, lon: -22.47801, url: "lag" },
            { id: "rah", name: "Rauðhólar", lat: 63.852372, lon: -22.58946, url: "rah" },
            { id: "lfe", name: "Lágafell", lat: 63.88183, lon: -22.53423, url: "lfe" },
            { id: "ger", name: "Gerðar", lat: 63.83104, lon: -22.47742, url: "ger" },
            { id: "hrv", name: "Hraunsvík", lat: 63.89597, lon: -22.18444, url: "hrv" },
            { id: "hvs", name: "Hveragerði", lat: 63.939395, lon: -21.714498, url: "hvs" },
            { id: "bja", name: "Bjarnarflag", lat: 63.946, lon: -21.303, url: "bja" },
            { id: "hei", name: "Heiðarsporður", lat: 64.200, lon: -21.237, url: "hei" },
          { id: "ada", name: "Adalbol", lat: 65.032106, lon: -15.399528, url: "ada" },
    { id: "alf", name: "Alftagrof", lat: 63.490613, lon: -19.188062, url: "alf" },
    { id: "asb", name: "Asbjarnarstadir", lat: 64.750851, lon: -21.320842, url: "asb" },
    { id: "ask", name: "Askja", lat: 65.053807, lon: -16.644591, url: "ask" },
    { id: "asm", name: "Asmuli", lat: 63.833146, lon: -20.611921, url: "asm" },
    { id: "aus", name: "Austmannsbunga", lat: 63.684091, lon: -19.077611, url: "aus" },
    { id: "bjk", name: "Bruarjokull", lat: 64.465884, lon: -16.769616, url: "bjk" },
    { id: "ble", name: "Bleikáluháls", lat: 65.07795, lon: -18.63868, url: "ble" },
    { id: "bre", name: "Brettingsstadir", lat: 66.124849, lon: -17.909947, url: "bre" },
    { id: "dim", name: "Dimmadalsas", lat: 65.961592, lon: -16.933611, url: "dim" },
    { id: "djk", name: "Dyngjujökull", lat: 64.50405, lon: -17.23571, url: "djk" },
    { id: "dyn", name: "Dyngjuhals", lat: 64.790530, lon: -17.356029, url: "dyn" },
    { id: "eda", name: "Engjadalur", lat: 64.074700, lon: -21.387901, url: "eda" },
    { id: "esk", name: "Eysrtri-Skogar", lat: 63.525355, lon: -19.449540, url: "esk" },
    { id: "fag", name: "Fagurholmsmyri", lat: 63.875176, lon: -16.651050, url: "fag" },
    { id: "fal", name: "Fallsjokull", lat: 63.959511, lon: -16.820789, url: "fal" },
    { id: "fed", name: "Fedgar", lat: 64.02508, lon: -19.69086, url: "fed" },
    { id: "fja", name: "Fjallsendi", lat: 65.019235, lon: -17.067830, url: "fja" },
    { id: "gei", name: "Geitafell", lat: 63.946510, lon: -21.527603, url: "gei" },
    { id: "god", name: "Godabunga", lat: 63.65976, lon: -19.32236, url: "god" },
    { id: "gra", name: "Granastaðir", lat: 65.9176, lon: -17.57855, url: "gra" },
    { id: "grf", name: "Grímsfjall", lat: 64.40656, lon: -17.26713, url: "grf" },
    { id: "gri", name: "Grimsey", lat: 66.54152, lon: -18.00951, url: "gri" },
    { id: "grs", name: "Grímsstaðir", lat: 65.63811, lon: -16.12409, url: "grs" },
    { id: "gst", name: "Grásteinn", lat: 64.692483, lon: -21.953373, url: "gst" },
    { id: "gil", name: "Gilhagi", lat: 66.07734, lon: -16.35131, url: "gil" },
    { id: "gyg", name: "Gýgjahólskot", lat: 64.28107, lon: -20.21483, url: "gyg" },
    { id: "hau", name: "Haukadalur", lat: 63.96851, lon: -19.96471, url: "hau" },
    { id: "hed", name: "Héðinshöfði", lat: 66.0808, lon: -17.30975, url: "hed" },
    { id: "hes", name: "Hestalda", lat: 64.0468, lon: -19.5604, url: "hes" },
    { id: "hit", name: "Hítardalur", lat: 64.803308, lon: -22.043553, url: "hit" },
    { id: "hla", name: "Hella", lat: 65.94441, lon: -18.38724, url: "hla" },
    { id: "hrn", name: "Hraun", lat: 66.11, lon: -20.12252, url: "hrn" },
    { id: "hus", name: "Húsbóndi", lat: 64.2955, lon: -17.6565, url: "hus" },
    { id: "hvo", name: "Lágu-Hvolar", lat: 63.5261, lon: -18.84781, url: "hvo" }
                        
];

        
            
        

        stations.forEach(function(st) {
            var marker = L.circleMarker([st.lat, st.lon], {
                radius: 8, fillColor: "#ff0000", color: "#fff", weight: 2, fillOpacity: 1
            }).addTo(map);

            L.marker([st.lat, st.lon], {
    icon: L.divIcon({
        className: 'transparent-label', 
      html: `<div style="background:none; border:none; color:black; font-weight:bold; font-size:11px; white-space:nowrap; text-shadow: 1px 1px 0px white;">${st.id.toUpperCase()}</div>`,
        iconAnchor: [-12, 8] 
    }),
    interactive: false
}).addTo(map);

          

            marker.on('click', function() {
                var drumURL = `http://hraun.vedur.is/ja/drumplot/drumplot/${st.url}_highpass_2.0.png`;
                
                var content = `
                    <h2 style="color:#c62828; margin-top:0;">${st.name}</h2>
                    <div class="coords-text">LAT: ${st.lat} | LON: ${st.lon}</div>
                    <p style="margin:20px 0; font-size:1.1em;">Real-time plot data for <strong>${st.name}</strong></p>
                    <div style="margin-top:20px;">
                        <a href="${drumURL}" target="_blank" class="btn">VIEW HIGH-PASS DRUMPLOT ↗</a>
                    </div>
                `;
                document.getElementById('station-content').innerHTML = content;
                sidebar.open('home');
            });
        });

        L.control.zoom({ position: 'topright' }).addTo(map);
    </script>
</body>
</html>
