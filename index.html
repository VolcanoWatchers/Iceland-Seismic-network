        allMarkers.forEach(marker => {
            // Find the station data that matches this marker
            const station = stations.find(s => s.id.toLowerCase() === marker.stationID);
            
            if (station && station.type === 'gps') {
                marker.addTo(map); // Keep/Add the Green Triangle
            } else {
                map.removeLayer(marker); // Remove the Red Seismic Dot
            }
        });
    } else if (e.id === 'home') {
        // --- SEISMIC TAB OPENED: Show ONLY Red Dots ---
        allMarkers.forEach(marker => {
            const station = stations.find(s => s.id.toLowerCase() === marker.stationID);
            
            if (station && station.type === 'gps') {
                map.removeLayer(marker); // Remove the Green Triangle
            } else {
                marker.addTo(map); // Keep/Add the Red Seismic Dot
            }
        });
    }
});

        sidebar.open('home');
        const secureDrumURL = `https://wsrv.nl/?url=http://hraun.vedur.is/ja/drumplot/drumplot/${st.url}_highpass_2.0.png&noproxy`;
        const secureTremorURL = `https://wsrv.nl/?url=http://hraun.vedur.is/ja/oroi/${st.url}.gif&noproxy`;
        
        document.getElementById('station-data').innerHTML = `
            <div style="padding:10px;">
                <h2 style="color:#c62828; margin-bottom:5px;">${st.name} (${st.id.toUpperCase()})</h2>
                <div class="coords-text" style="color: #444; font-weight: bold;">LAT: ${st.lat} | LON: ${st.lon}</div>
                <p style="margin:5px 0 2px 0; font-weight: 800; color: #222; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">🌋 Volcanic Tremor (Órói)</p>
                <a href="${secureTremorURL}" target="_blank"><img src="${secureTremorURL}" alt="Tremor Chart"></a>
                <p style="margin:12px 0 2px 0; font-weight: 800; color: #222; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;">📉 Drumplot (Highpass)</p>
                <a href="${secureDrumURL}" target="_blank"><img src="${secureDrumURL}" alt="Drum Plot"></a>
            </div>`;
    }
});
// 5. Search Logic
const searchInput = document.getElementById('stationSearch');
const clearBtn = document.getElementById('clearSearch');

if (searchInput) {
    searchInput.addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase().trim();
        clearBtn.style.display = term.length > 0 ? 'block' : 'none';

        if (term.length === 3 || term.length === 4) {
            const match = allMarkers.find(m => m.stationID === term);
            if (match) {
                const station = stations.find(s => s.id.toLowerCase() === term);
                if (station && station.type === 'gps') {
                    sidebar.open('gps');
                } else {
                    sidebar.open('home');
                }
                allMarkers.forEach(m => m.addTo(map));
                map.setView(match.getLatLng(), 10);
                match.fire('click');
            }
        }
    });

    clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        this.style.display = 'none';
        sidebar.close();
        resetMap();
    });
}
    </script>
</body>
</html>
