    var redDotIcon = L.divIcon({

     marker.stationName = st.name.toLowerCase();

});

    allMarkers.push(marker);

    const drumURL = `http://hraun.vedur.is/ja/drumplot/drumplot/${st.url}_highpass_2.0.png?t=${new Date().getTime()}`;

 // 5. Search Function with Auto-Centring
const searchInput = document.getElementById('stationSearch');
if (searchInput) {
    searchInput.addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        let foundFirstMatch = false;

        allMarkers.forEach(marker => {
            const isMatch = marker.stationName.includes(term) || marker.stationID.includes(term);
            
            if (isMatch) { 
                marker.addTo(map);
                // If this is the first match and the search term isn't empty, zoom to it!
                if (!foundFirstMatch && term.length > 0) {
                    map.setView(marker.getLatLng(), 10); // Zoom level 10 is a good "close up"
                    foundFirstMatch = true;
                }
            } else { 
                map.removeLayer(marker); 
            }
        });
    });
}
